name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "7.0"
            phpunit: "6"
          - php: "7.1"
            phpunit: "7"
          - php: "7.2"
            phpunit: "8"
          - php: "7.3"
            phpunit: "9"
          - php: "7.4"
            phpunit: "9"
          - php: "8.0"
            phpunit: "9"
          - php: "8.1"
            phpunit: "10"
          - php: "8.2"
            phpunit: "10"
          - php: "8.3"
            phpunit: "10"
          - php: "8.4"
            phpunit: "10"
          - php: "8.5"
            phpunit: "10"

    name: PHP ${{ matrix.php }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: dom, mbstring, xml, xmlwriter
          tools: phpunit:${{ matrix.phpunit }}

      - name: Show runtime versions
        run: |
          php --version
          phpunit --version

      - name: Run PHPUnit
        run: phpunit --configuration tests/phpunit-ci.xml

  wordpress:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wordpress:
          - "6.7"
          - "6.8"
          - "6.9"

    name: WordPress ${{ matrix.wordpress }}

    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306/tcp
        options: >-
          --health-cmd="mariadb-admin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=6

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          extensions: dom, mbstring, mysqli, xml, xmlwriter

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Install WordPress test suite
        env:
          WP_INSTALL_TESTS_SKIP_UPDATE_CHECK: "true"
        run: |
          bin/install-wp-tests.sh codecolorer_test root root 127.0.0.1:${{ job.services.mysql.ports['3306'] }} ${{ matrix.wordpress }}

      - name: Run WordPress integration tests
        run: vendor/bin/phpunit --configuration tests/phpunit-wp.xml
