name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "7.0"
            phpunit: "6"
          - php: "7.1"
            phpunit: "7"
          - php: "7.2"
            phpunit: "8"
          - php: "7.3"
            phpunit: "9"
          - php: "7.4"
            phpunit: "9"
          - php: "8.0"
            phpunit: "9"
          - php: "8.1"
            phpunit: "10"
          - php: "8.2"
            phpunit: "10"
          - php: "8.3"
            phpunit: "10"
          - php: "8.4"
            phpunit: "10"
          - php: "8.5"
            phpunit: "10"

    name: PHP ${{ matrix.php }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: dom, mbstring, xml, xmlwriter
          tools: phpunit:${{ matrix.phpunit }}

      - name: Show runtime versions
        run: |
          php --version
          phpunit --version

      - name: Run PHPUnit
        run: phpunit tests
