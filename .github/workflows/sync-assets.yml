name: Sync WordPress.org Assets

on:
  push:
    branches:
      - main
    paths:
      - ".wordpress-org/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-wordpress-org-assets
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: wordpress-org

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install release dependencies
        run: sudo apt-get update && sudo apt-get install -y rsync subversion

      - name: Sync WordPress.org assets
        env:
          WPORG_USERNAME: ${{ secrets.WPORG_USERNAME }}
          WPORG_PASSWORD: ${{ secrets.WPORG_PASSWORD }}
        run: bin/sync-wordpress-org-assets.sh
